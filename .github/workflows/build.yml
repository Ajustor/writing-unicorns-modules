name: Build & Release

on:
  push:
    branches: [master]
    tags:
      - "v*"
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            lib_prefix: lib
            lib_ext: so
          - os: windows-latest
            platform: windows
            lib_prefix: ""
            lib_ext: dll
          - os: macos-latest
            platform: macos
            lib_prefix: lib
            lib_ext: dylib

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build all modules (release)
        run: cargo build --release --workspace

      - name: Detect modules from workspace
        id: modules
        shell: bash
        run: |
          modules=$(sed -n '/members/,/]/p' Cargo.toml | grep -o '"[^"]*"' | tr -d '"' | tr '\n' ' ')
          echo "list=${modules}" >> "$GITHUB_OUTPUT"
          echo "Detected modules: ${modules}"

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          for crate in ${{ steps.modules.outputs.list }}; do
            mkdir -p "dist/${crate}"
            cp "${crate}/manifest.toml" "dist/${crate}/"
            lib_name="${{ matrix.lib_prefix }}${crate//-/_}.${{ matrix.lib_ext }}"
            src="target/release/${lib_name}"
            if [ -f "$src" ]; then
              cp "$src" "dist/${crate}/"
            else
              echo "Warning: $src not found"
            fi
          done
          ls -laR dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modules-${{ matrix.platform }}
          path: dist/
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Detect modules from workspace
        id: modules
        run: |
          modules=$(sed -n '/members/,/]/p' Cargo.toml | grep -o '"[^"]*"' | tr -d '"' | tr '\n' ' ')
          echo "list=${modules}" >> "$GITHUB_OUTPUT"

      - name: Package per module
        run: |
          mkdir -p release
          for crate in ${{ steps.modules.outputs.list }}; do
            mkdir -p "release/${crate}"
            # Copy manifest.toml from any platform (identical across all)
            for platform in linux windows macos; do
              manifest="artifacts/modules-${platform}/${crate}/manifest.toml"
              if [ -f "$manifest" ]; then
                cp "$manifest" "release/${crate}/"
                break
              fi
            done
            # Copy platform libraries
            for platform_dir in artifacts/modules-*/; do
              find "${platform_dir}${crate}" -maxdepth 1 -type f \
                \( -name "*.so" -o -name "*.dll" -o -name "*.dylib" \) \
                -exec cp {} "release/${crate}/" \; 2>/dev/null || true
            done
            # Create zip
            (cd release && zip -r "../${crate}.zip" "${crate}/")
          done
          ls -la *.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
